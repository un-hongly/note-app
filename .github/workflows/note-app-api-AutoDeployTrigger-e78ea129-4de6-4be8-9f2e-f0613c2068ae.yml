name: Trigger auto deployment for note-app-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/note-app-api-AutoDeployTrigger-e78ea129-4de6-4be8-9f2e-f0613c2068ae.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.NOTEAPPAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.NOTEAPPAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.NOTEAPPAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.NOTEAPPAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.NOTEAPPAPI_REGISTRY_PASSWORD }}
          containerAppName: note-app-api
          resourceGroup: note-app
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


