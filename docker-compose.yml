services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: YourStrong!Passw0rd
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - sqlserver-data:/var/opt/mssql
    ports:
      - "1433:1433"

  backend:
    build: ./backend
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5001
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=note_app_db;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
      Jwt__Key: change-me-to-a-key-at-least-32-characters-long
      Jwt__Issuer: NoteAppApi
      Jwt__Audience: note-app
    ports:
      - "5001:5001"   
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  sqlserver-data:
